<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Workflow Pack</title>
  <desc id="desc">Reusable AGENTS.md and SKILL.md workflow packs for AI coding agents.</desc>
  <rect width="1200" height="630" fill="#f7f7f4"/>
  <rect x="56" y="56" width="1088" height="518" rx="18" fill="#ffffff" stroke="#d9d9d2" stroke-width="2"/>
  <text x="96" y="132" fill="#115e59" font-family="Arial, sans-serif" font-size="28" font-weight="700">Agent Workflow Pack</text>
  <text x="96" y="236" fill="#181a1f" font-family="Arial, sans-serif" font-size="72" font-weight="800">Stop rewriting</text>
  <text x="96" y="316" fill="#181a1f" font-family="Arial, sans-serif" font-size="72" font-weight="800">the same agent prompt.</text>
  <text x="96" y="390" fill="#3a414a" font-family="Arial, sans-serif" font-size="30">AGENTS.md + SKILL.md + templates + verification checklists</text>
  <rect x="96" y="450" width="230" height="62" rx="8" fill="#0f766e"/>
  <text x="126" y="491" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Free fit check</text>
  <text x="358" y="490" fill="#181a1f" font-family="Arial, sans-serif" font-size="24">$99 pilot workflow packs</text>
  <g transform="translate(835 120)">
    <rect x="0" y="0" width="230" height="58" rx="8" fill="#101418"/>
    <rect x="0" y="88" width="230" height="58" rx="8" fill="#101418"/>
    <rect x="0" y="176" width="230" height="58" rx="8" fill="#101418"/>
    <text x="24" y="38" fill="#edf2f7" font-family="Arial, sans-serif" font-size="22">AGENTS.md</text>
    <text x="24" y="126" fill="#edf2f7" font-family="Arial, sans-serif" font-size="22">SKILL.md</text>
    <text x="24" y="214" fill="#edf2f7" font-family="Arial, sans-serif" font-size="22">verification.md</text>
    <path d="M115 62 L115 84" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <path d="M115 150 L115 172" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  </g>
